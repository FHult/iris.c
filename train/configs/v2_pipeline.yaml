# V2 pipeline configuration
# Reference: plans/pipeline-v2-architecture.md

recipe: ip_adapter_flux4b
chunks: 4
scale: small          # small | medium | large | all-in
poll_interval: 60     # orchestrator poll cycle in seconds

anomaly:
  loss_threshold: 2.0       # pause when loss exceeds this for loss_high_steps consecutive steps
  loss_high_steps: 100      # steps of sustained high loss before pausing
  grad_norm_pause: 50.0     # grad norm above this for grad_spike_polls polls → pause
  grad_norm_warn: 10.0      # grad norm above this → log warning
  grad_spike_polls: 10      # number of consecutive high-grad-norm polls before pausing
  siglip_min_coverage: 90   # warn when SigLIP coverage drops below this %

model:
  flux_model: flux-klein-4b
  checkpoint_dir: /Volumes/2TBSSD/checkpoints/stage1

training_config: train/configs/stage1_512px.yaml

# JourneyDB tgz ranges per chunk per scale (0-indexed tgz numbers)
jdb:
  tgz_ranges:
    small:
      1: [0, 4]
      2: [50, 54]
      3: [100, 104]
      4: [150, 154]
    medium:
      1: [0, 12]
      2: [50, 62]
      3: [100, 112]
      4: [150, 162]
    large:
      1: [0, 24]
      2: [50, 74]
      3: [100, 124]
      4: [150, 174]
    all-in:
      1: [0, 49]
      2: [50, 99]
      3: [100, 149]
      4: [150, 201]

# Fraction of LAION/COYO to use per scale (applied via effective chunk denominator)
data_volume:
  small:  0.10
  medium: 0.25
  large:  0.50
  all-in: 1.00

training:
  hard_mix_ratio: 0.05
  siglip: true        # SigLIP precompute enabled (~420 GB extra)

  # Steps per chunk per scale
  steps:
    small:
      1: 50000
      2: 15000
      3: 15000
      4: 15000
    medium:
      1: 105000
      2: 40000
      3: 40000
      4: 40000
    large:
      1: 200000
      2: 60000
      3: 60000
      4: 60000
    all-in:
      1: 540000
      2: 200000
      3: 200000
      4: 200000

  # Learning rate per chunk
  lr:
    1: 1.0e-4
    2: 3.0e-5
    3: 1.0e-5
    4: 1.0e-5
