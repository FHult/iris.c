# V2 pipeline configuration
# Reference: plans/pipeline-v2-architecture.md

recipe: ip_adapter_flux4b
chunks: 4
scale: large          # dev | smoke | small | medium | large | all-in
poll_interval: 60     # orchestrator poll cycle in seconds

anomaly:
  loss_threshold: 2.0       # pause when loss exceeds this for loss_high_steps consecutive steps
  loss_high_steps: 100      # steps of sustained high loss before pausing
  grad_norm_pause: 50.0     # grad norm above this for grad_spike_polls polls → pause
  grad_norm_warn: 10.0      # grad norm above this → log warning
  grad_spike_polls: 10      # number of consecutive high-grad-norm polls before pausing
  siglip_min_coverage: 90   # warn when SigLIP coverage drops below this %

model:
  flux_model: flux-klein-model
  checkpoint_dir: /Volumes/2TBSSD/checkpoints/stage1

training_config: train/configs/stage1_512px.yaml

# JourneyDB tgz ranges per chunk per scale (0-indexed tgz numbers)
jdb:
  # Tgz 0 (000.tar) is permanently reserved for the held-out validation set.
  # Never include tgz 0 in any training range. Run:
  #   pipeline_ctl.py create-val-set
  # once before the first training run to build and precompute the val shards.
  validation_tgzs: [0, 0]

  tgz_ranges:
    dev:
      1: [1, 1]         # single tgz — minimum for a buildable checkpoint
    smoke:
      1: [1, 1]
    small:
      1: [1, 5]
      2: [50, 54]
      3: [100, 104]
      4: [150, 154]
    medium:
      1: [1, 13]
      2: [50, 62]
      3: [100, 112]
      4: [150, 162]
    large:
      1: [1, 25]
      2: [50, 74]
      3: [100, 124]
      4: [150, 174]
    all-in:
      1: [1, 49]
      2: [50, 99]
      3: [100, 149]
      4: [150, 201]

# Fraction of LAION/COYO to use per scale (applied via effective chunk denominator)
data_volume:
  dev:    0.005
  smoke:  0.005
  small:  0.10
  medium: 0.25
  large:  0.50
  all-in: 1.00

training:
  mine_use_ema: true            # use EMA weights for hard-example scoring (recommended)
  mine: true                    # set false to skip mining entirely (e.g. dev scale)
  hard_mix_ratio: 0.05          # default for all chunks
  # Per-chunk overrides: higher ratio for later chunks whose hard examples
  # were mined from a stronger checkpoint.  Omit a chunk to use the default.
  hard_mix_ratio_by_chunk:
    2: 0.10
    3: 0.12
    4: 0.15
  siglip: true        # SigLIP precompute enabled (~420 GB extra)

  # Hard-example mining eval budget per scale.
  # Records sampled for loss ranking; higher = better coverage of hard tail.
  mine_eval_records:
    dev:    200
    smoke:  500
    small:  10000
    medium: 20000
    large:  30000
    all-in: 50000

  # Top-K hard examples extracted per mining run.
  mine_top_k:
    dev:    50
    smoke:  200
    small:  2000
    medium: 3000
    large:  5000
    all-in: 8000

  # Steps per chunk per scale
  steps:
    dev:
      1: 1000
    smoke:
      1: 100
    small:
      1: 50000
      2: 15000
      3: 15000
      4: 15000
    medium:
      1: 105000
      2: 40000
      3: 40000
      4: 40000
    large:
      1: 200000
      2: 60000
      3: 60000
      4: 60000
    all-in:
      1: 540000
      2: 200000
      3: 200000
      4: 200000

  # Learning rate per chunk
  lr:
    1: 1.0e-4
    2: 3.0e-5
    3: 1.0e-5
    4: 1.0e-5

# Multi-tier storage — cold (archive) and hot (active compute) roots.
# See train/TRAINING.md §Storage Tiers for full documentation.
#
# Single-SSD prototyping (default): omit this block or set both roots to
# the same path. All staging/archiving operations become no-ops.
#
# Two-device setup example:
#   cold_root: "/Volumes/RawHDD"    # HDD or secondary SSD — source of truth
#   hot_root:  "/Volumes/FastTB5"   # primary NVMe — active compute runs here
storage:
  cold_root:      "/Volumes/16TBCold"          # 16 TB cold volume — source of truth + knowledge base
  hot_root:       "/Volumes/2TBSSD"            # 2 TB NVMe — active compute working area
  ultrahot_root:  "/Users/fredrikhult/ultrahot" # internal NVMe — lowest-latency serving path
  data_prep_tier: hot             # hot (default) | ultrahot — where prep scripts write working data
  staging_margin_gb: 50           # abort staging if hot free space would drop below this
  cleanup_safety_gb: 20           # minimum hot free space before any cleanup
  archive_after_chunk: true       # archive precomputed + weights to cold after each chunk
  background_staging: true        # stage next chunk in background while training runs
  max_parallel_transfers: 3       # concurrent symlink/copy workers
  # Persistent data pools on cold volume:
  # raw_pool_root omitted — raw tgzs are re-downloadable; no value storing them long-term
  converted_pool_root: "/Volumes/16TBCold/converted/journeydb"  # converted tars persisted; skip download+convert on hit
  dedup_pool: true          # run CLIP dedup on each pool tar after conversion (DEDUP-1)

# Precompute shard cap per scale: large/all-in produce many more shards than needed
# for training; cap precompute so disk and wall-clock stay bounded.
# null (or omitted) = precompute all available shards.
precompute:
  max_shards:
    large: 80
    all-in: 120
  # VAE encode batch size. Profiled on M1 Max at 512px: B=4 is optimal (145ms/img).
  # B=16 (prior default) is 20% slower; B=32+ degrades further; B=64 OOM.
  vae_batch: 4
