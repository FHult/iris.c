# train/configs/stage1_512px.yaml
# Stage 1 training configuration — 512px
# Default (large scale, chunk 1): 200K steps, ~3.5 days on M1 Max 32GB
# num_steps here is the direct-run default only; the pipeline overrides it via --max-steps.

model:
  flux_model_dir: "flux-klein-model"       # path to Flux Klein 4B weights
  qwen3_model_dir: "flux-klein-model"      # Qwen3 4B encoder (same dir)
  siglip_model: "google/siglip-so400m-patch14-384"
  warmstart_path: null                     # set to InstantX adapter path to warmstart Perceiver

adapter:
  num_blocks: 25                           # 5 double + 20 single for Klein 4B
  num_double_blocks: 5                     # used by effective_scale(style_only=True)
  hidden_dim: 3072
  num_image_tokens: 128
  siglip_dim: 1152
  perceiver_depth: 4
  perceiver_heads: 16
  # Inference-time flags (no effect during training)
  style_only: false                        # true → zero double-stream ip_scale (indices 0–4)
  sref_strength: 1.0                       # global ip_scale multiplier (0.0–2.0 typical range)
  # Training: freeze double-stream scales at zero (QUALITY-2)
  freeze_double_stream_scales: true        # blocks 0–4 stay zero; style learnt via single-stream only

data:
  shard_path: "train/data/shards"
  # Pre-computed encoder caches (see train/scripts/precompute_*.py)
  # Set to null to compute at runtime (slower but no storage needed)
  qwen3_cache_dir: "train/data/precomputed/qwen3"    # ~143 GB, saves ~200ms/step
  vae_cache_dir: "train/data/precomputed/vae"        # ~198 GB, saves ~180ms/step
  siglip_cache_dir: "train/data/precomputed/siglip"  # ~8 GB at small scale (~420 GB all-in)
  anchor_shard_dir: null                              # set by pipeline (10 anchor shards, always mixed)
  anchor_mix_ratio: 0.20
  hard_example_dir: null                              # set by pipeline after chunk 1 mining completes
  hard_mix_ratio: 0.05                               # 5% of batches from hard examples
  batch_size: 1
  prefetch_batches: 12
  num_prefetch_threads: 2

training:
  num_steps: 200000
  warmup_steps: 1000
  learning_rate: 1.0e-4
  weight_decay: 1.0e-2
  grad_clip: 1.0
  ema_decay: 0.9999
  ema_update_every: 10                     # update EMA every N steps (saves ~23min total)

  # Null conditioning dropout for scale control at inference
  image_dropout_prob: 0.30                 # 30%: zero out ip_embeds
  text_dropout_prob: 0.10                  # 10%: use empty text prompt

  # Optional Gram matrix style loss (see train/README.md — Style Loss section)
  # Adds a Gram matrix MSE term on predicted vs. reference clean latent channels.
  style_loss_weight: 0.05                  # enabled; monitor grad_norm — reduce to 0.01 if spikes
  style_loss_every: 1                      # compute every N steps (higher = less overhead)

  # QUALITY-1: cross-ref permutation — swap SigLIP features across batch items (50% of steps)
  # Forces style/content separation; tracked via loss_self_ref vs loss_cross_ref in logs.
  cross_ref_prob: 0.5

  # QUALITY-3: patch-shuffle — randomise 729-token SigLIP sequence (50% of steps)
  # Destroys spatial layout while preserving per-patch texture statistics.
  patch_shuffle_prob: 0.5

output:
  checkpoint_dir: "train/data/checkpoints/stage1"
  checkpoint_every: 500                    # steps between checkpoints; matches log_every to reduce page-cache pressure
  keep_last_n: 5                            # recency window; up to 3 best-val-loss are also kept automatically
  log_every: 500

eval:
  enabled: false                             # set true to run eval every N steps
  every_steps: 10000                         # how often to evaluate
  num_steps: 4                               # denoising steps per sample (4 for distilled)
  width: 512
  height: 512
  seed: 42

logging:
  # wandb_project: "iris-ip-adapter"
  # wandb_run_name: "stage1-512px"
