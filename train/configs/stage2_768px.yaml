# train/configs/stage2_768px.yaml
# Stage 2 training configuration — 768px fine-tune from Stage 1 checkpoint
# Expected wall-clock: ~1.05 days on M1 Max 32GB (scenario B)

model:
  flux_model_dir: "flux-klein-model"
  qwen3_model_dir: "flux-klein-model"
  siglip_model: "google/siglip-so400m-patch14-384"
  warmstart_path: "checkpoints/stage1/best.safetensors"  # resume from Stage 1

adapter:
  num_blocks: 25
  hidden_dim: 3072
  num_image_tokens: 128
  siglip_dim: 1152
  perceiver_depth: 4
  perceiver_heads: 16

data:
  shard_path: "train/data/shards"
  qwen3_cache_dir: "train/data/precomputed/qwen3"    # reuse Stage 1 cache
  vae_cache_dir: null                      # 768px latents not pre-computed (different size)
  siglip_cache_dir: null
  batch_size: 1                            # reduced at 768px (activation budget)
  prefetch_batches: 4
  num_prefetch_threads: 2

training:
  num_steps: 20000
  warmup_steps: 200
  learning_rate: 3.0e-5                    # lower LR for fine-tune
  weight_decay: 1.0e-2
  grad_clip: 1.0
  ema_decay: 0.9999
  ema_update_every: 10
  image_dropout_prob: 0.30
  text_dropout_prob: 0.10

output:
  checkpoint_dir: "checkpoints/stage2"
  checkpoint_every: 500                    # steps between checkpoints (~1h at 8s/step)
  keep_last_n: 5
  log_every: 50

logging:
  wandb_project: "iris-ip-adapter"
  wandb_run_name: "stage2-768px"
