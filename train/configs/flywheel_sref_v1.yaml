# Flywheel config — self-improving sref optimization loop
#
# Launch:
#   pipeline_ctl start-flywheel train/configs/flywheel_sref_v1.yaml
#   pipeline_ctl flywheel-status
#   pipeline_ctl pause-flywheel / resume-flywheel / stop-flywheel
#
# Report-only (regenerate HTML from existing DB):
#   train/.venv/bin/python train/scripts/orchestrator.py \
#       --flywheel-config train/configs/flywheel_sref_v1.yaml --report-only

flywheel:
  name: "sref-v1"
  max_iterations: 42             # trial 1: 21 iters; trial 2: +21 warm-start
  steps_per_iteration: 1000      # training steps per iteration (~63 min at 512px, 3.8s/step)
  n_shards: 20                   # shards selected per iteration
  poll_interval: 60              # seconds between training-window polls
  min_free_gb: 40                # abort if disk drops below this

  # Base checkpoint to resume from on first iteration.
  # Leave null to start from scratch (randomly initialised adapter weights).
  base_checkpoint: null

  # Training config YAML — shard_path and max_steps are overridden per iteration.
  training_config: "train/configs/stage1_512px.yaml"

  # Starting hyperparams applied on top of training_config.
  # After each ablation burst the best-found values are merged in here.
  hyperparams:
    cross_ref_prob: 0.35
    style_loss_weight: 0.07

  # Shard selection policy
  shard_selection:
    performance_weight: 0.60     # fraction of slots for top-scoring shards (uses effective_score)
    min_diversity_pct:  0.20     # fraction for diversity (SigLIP max-min-dist, or source-tag fallback)
    exploration_rate:   0.15     # fraction for unseen / least-seen shards
    recency_penalty:    0.30     # discount factor for recently-selected shards
    recency_window_iters: 3      # iterations over which recency penalty applies

  # Attribution configuration
  # min_attribution_obs: minimum observations in BOTH included and excluded sets before
  # the attributed (causal) score is used for ranking.  Lower = faster trust, noisier.
  # Trial 1: only 2 shards activated attribution after 12 iterations at obs=3.
  # Lowered to 2 for faster convergence; still requires evidence on both sides.
  min_attribution_obs: 2

  # SigLIP mean embedding
  # siglip_sample_n: images sampled per shard when computing mean embedding.
  # Larger = more accurate diversity but slower scan.
  siglip_sample_n: 50

  # Shard manifest JSON path: {shard_id: {source: str, ...}}
  # If set, overrides the heuristic _infer_source() for source tagging.
  # Leave null to use the built-in heuristic.
  shard_manifest: null

  # Plateau detection — pause flywheel when cond_gap improvement stalls.
  # Set plateau_patience: 0 to disable.
  # A plateau is declared when max(cond_gap) - min(cond_gap) over the last
  # plateau_patience done iterations is < plateau_threshold.
  plateau_patience:   5          # require 5 consecutive done iters before declaring plateau
  plateau_threshold:  0.02       # spread < 0.02 triggers pause (~half a typical cond_gap step)

  # Ablation integration — set ablation_every_n: 0 to disable
  ablation_every_n: 5            # trial 2: fire at iters 25, 30, 35, 40 (~4h overhead per burst at 4×1000 steps)
  ablation_max_runs: 4           # 4 runs × ~63 min = ~4h per burst; proportional to flywheel step budget
  ablation_config: "train/configs/ablation_sref_v1.yaml"
