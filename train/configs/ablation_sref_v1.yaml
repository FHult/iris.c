# Ablation harness config — long-term style-feature search (QUALITY-10+)
#
# Launch:
#   pipeline_ctl start-ablation train/configs/ablation_sref_v1.yaml
#   pipeline_ctl ablation-status
#   pipeline_ctl stop-ablation
#
# Or run directly:
#   train/.venv/bin/python train/scripts/ablation_harness.py \
#       --config train/configs/ablation_sref_v1.yaml \
#       --output-dir /Volumes/2TBSSD/ablation_sref_v1

ablation:
  name: "sref-v1"
  max_total_runs: 128        # full grid = 4×4×2×4 = 128 candidates
  steps_per_run: 1000        # match steps_per_iteration in flywheel config (~63 min/run at 512px, 3.8s/step)
  strategy: "bayesian"       # grid | random | bayesian
  n_initial: 12              # random warm-up before GP kicks in (bayesian only)

  objective:
    # cond_gap is the primary signal at 1000-step budgets: stable, positive,
    # and has meaningful spread across hyperparameter configs.  ref_gap is
    # consistently negative and noisy at this scale (trial 1 observation).
    clip_i_weight: 0.15          # ref_gap: kept as weak secondary signal
    cross_ref_gap_weight: 0.70   # cond_gap: primary adapter learning signal
    stability_weight: 0.15       # stability: low final loss

  variables:
    cross_ref_prob:              [0.0, 0.2, 0.35, 0.5]
    patch_shuffle_prob:          [0.0, 0.25, 0.4, 0.5]
    freeze_double_stream_scales: [true, false]
    style_loss_weight:           [0.0, 0.03, 0.07, 0.12]

  conditions:
    # Style loss weight > 0 only makes sense when cross-ref sampling is enabled.
    # This removes 3×4 = 12 invalid combos, leaving 116 valid candidates.
    - "style_loss_weight == 0 or cross_ref_prob > 0"

  # Per-run early stopping — terminate a single bad run (cond_gap persistently low).
  # Only activates after min_snapshots to avoid killing the warmup phase.
  early_stopping:
    enabled:        true
    min_cond_gap:  -0.30   # below this for `patience` consecutive snapshots → SIGTERM
    patience:       4      # consecutive bad snapshots needed
    min_snapshots:  5      # snapshots before early stopping can activate

  # Campaign-level plateau detection — stop the whole campaign when search stalls.
  # Distinct from early_stopping (which kills one run); this stops the campaign.
  # Use --force-continue to override if you want to keep exploring anyway.
  plateau_detection:
    enabled:    true
    patience:   10       # consecutive non-improving runs before stopping
    min_delta:  0.01     # minimum score improvement to reset the counter
    min_runs:   12       # don't activate before this many runs (exploration phase)
